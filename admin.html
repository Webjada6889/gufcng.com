<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<form id="playerForm" class="card p-4 shadow">

<h4 class="text-center mb-4">GUFC Player Registration</h4>

<div class="mb-3">
<label class="form-label">Player Name</label>
<input type="text" class="form-control" id="name" placeholder="Enter player name" required>
</div>

<div class="mb-3">
<label class="form-label">Age</label>
<input type="number" class="form-control" id="age" placeholder="Enter age" required>
</div>

<div class="mb-3">
<label class="form-label">Jersey Number</label>
<input type="number" class="form-control" id="jersey" placeholder="Enter jersey number">
</div>

<div class="mb-3">
<label class="form-label">Position</label>
<select class="form-control" id="position">
<option value="">Select Position</option>
<option>Goalkeeper</option>
<option>Defender</option>
<option>Midfielder</option>
<option>Forward</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Height (cm)</label>
<input type="number" class="form-control" id="height" placeholder="Enter height">
</div>

<div class="mb-3">
<label class="form-label">Phone Number</label>
<input type="tel" class="form-control" id="phone" placeholder="Enter phone number">
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" id="email" placeholder="Enter email">
</div>

<div class="mb-3">
<label class="form-label">Player Photo</label>
<input type="file" class="form-control" id="photo" accept="image/*">
</div>

<button type="submit" class="btn btn-primary w-100">
Register Player
</button>

</form>


<style>
    /* Player Registration Form */

#playerForm{
background-color:#ffffff;
border-radius:15px;
max-width:500px;
margin:auto;
}

#playerForm h4{
color:#004080;
font-weight:bold;
}

#playerForm label{
font-weight:600;
color:#333;
}

#playerForm input,
#playerForm select{
border-radius:10px;
padding:10px;
border:1px solid #ccc;
transition:0.3s;
}

#playerForm input:focus,
#playerForm select:focus{
border-color:#004080;
box-shadow:0 0 5px rgba(0,64,128,0.4);
}

#playerForm button{
border-radius:25px;
padding:10px;
font-weight:bold;
background-color:#004080;
border:none;
transition:0.3s;
}

#playerForm button:hover{
background-color:#ffcc00;
color:#004080;
}

/* Photo Upload Style */

#photo{
padding:8px;
background:#f5f5f5;
border:1px dashed #004080;
}
</style>

<script>

document.getElementById("playerForm").addEventListener("submit", function(e){

e.preventDefault();

// Get form values
let name = document.getElementById("name").value;
let age = document.getElementById("age").value;
let jersey = document.getElementById("jersey").value;
let position = document.getElementById("position").value;
let height = document.getElementById("height").value;
let phone = document.getElementById("phone").value;
let email = document.getElementById("email").value;

let photoInput = document.getElementById("photo");
let photo = photoInput.files[0];

let reader = new FileReader();

reader.onload = function(){

let player = {
name: name,
age: age,
jersey: jersey,
position: position,
height: height,
phone: phone,
email: email,
photo: reader.result
};

// get old players
let players = JSON.parse(localStorage.getItem("players")) || [];

// add new player
players.push(player);

// save again
localStorage.setItem("players", JSON.stringify(players));

alert("Player Registered Successfully ⚽");

// clear form
document.getElementById("playerForm").reset();

};

if(photo){
reader.readAsDataURL(photo);
}

});



</script>

</body>
</html>
